<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <img src="logo.png" alt="ScaleX Logo">      
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Blogs</a>
            <a href="#">Contact Us</a>
        </div>
        <div class="btn-container">
            <button class="btn">Get Started</button>
            
        </div>
    </nav>

    <section>
        <div class="hero-section">
            <h1>Insights & Blogs</h1>
        </div>
        <div class="filter-btn">
            <button class="btnall"><span>All</span></button>
            <button class="btn">Tech</button>
            <button class="btn">SaaS</button>
            <button class="btn">Marketing</button>
        </div>
        <div class="cards-container">
            <div class="card">
                <img src="img1.jpg" alt="image1">
                <span class="card-category">Tech</span>
                <h3>The Ultimate Guide To SaaS Marketing</h3>
                <p>May 23, 2025</p>
            </div>
            <div class="card">
                <img src="img2.jpg" alt="image2">
                <span class="card-category">SaaS</span>
                <h3>5 Key Trends in SaaS Growth for 2025</h3>
                <p>May 23, 2025</p>
            </div>
            <div class="card">
                <img src="img3.jpg" alt="image3">
                <span class="card-category">Marketing</span>
                <h3>How Data-Driven Marketing is Reshaping the Industry</h3>
                <p>May 23, 2025</p>
            </div>
        </div>
    </section>
</body>
</html>
