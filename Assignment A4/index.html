<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepStyle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ballet:opsz@16..72&family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Lavishly+Yours&family=Pinyon+Script&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <nav>
            <div class="logo">
                <img src="logo.png" alt="DeepStyle Logo">
            </div>
            <div class="navitems">
                <ul>
                    <li><a href="#">New Arrivals</a></li>
                    <li><a href="#">Shop</a></li>
                    <li><a href="#">Beauty</a></li>
                    <li><a href="#">Sale</a></li>
                    <li><a href="#">journal</a></li>
                </ul>
            </div>
            <div class="navbuttons">
                <div id="navicons">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <div id="navicons"><i class="fa-solid fa-user"></i></div>
                <div id="navicons-last"><i class="fa-solid fa-cart-shopping fa-canvas-roomy"></i></i></div>
            </div>
        </nav>
        <div class="herosection">
            <div class="hero-heading">
                <div class="sunn"><img src="sunflower.png" alt="sunflower"></div>
                <p>Make Your Fashion Look <br>More Charming</p>
                <div class="hibis"><img src="hibiscus.png" alt="hibiscus"></div>
            </div>
            <div class="hero-decor">
                <img src="sunflower2.png" alt="sunflower">
            </div>

            <div class="decor-text">
                <p class="header">Summer Collection</p>
                <p class="desc">TRANDY AND <br>CLUSSI FOR <br> NEW SEASSON</p>
            </div>

            <div class="exploreimg">
                <img src="explore.png" alt="explore more">
            </div>
        </div>
        
        <div class="gallery">
            <div class="coloumn1">
                <div class="col1img">
                    <img src="left_image.png" alt="">
                </div>
            </div>
            <div class="coloumn2">
                <div class="col2img1">
                    <img src="top-left_image.png" alt="top-left_image">
                </div>
                <div class="col2img2">
                    <img src="bottom-left_image.png" alt="bottom-left-image">
                </div>
            </div>
            <div class="coloumn3">
                <div class="staricon">
                    <i class="fa-solid fa-certificate"></i>
                </div>
                <div class="col3img">
                    <img src="center_image.png" alt="center-img">
                </div>
            </div>
            <div class="coloumn4">
                <div class="col4img1">
                    <img src="top-right_image.png" alt="center-img">
                </div>
                <div class="col4img2">
                    <img src="bottom-right_image.png" alt="center-img">
                </div>
            </div>
            <div class="coloumn5">
                <div class="col5img">
                    <img src="right_image.png" alt="">

                </div>
            </div>
        </div>
        <div class="footterdecor">
            <i class="fa-sharp fa-solid fa-quote-left"></i>
        </div>
        <div class="cherryimg">
            <img src="cherry-blossom.png" alt="cherry-blossom">
        </div>
        
    </main>
</body>

</html>
